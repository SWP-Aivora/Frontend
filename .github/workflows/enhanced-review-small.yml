name: Gemini AI Enhanced Code Review (Small)

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

concurrency:
  group: enhanced-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Enhanced Code Review
    runs-on: ubuntu-latest
    # Skip draft PRs
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
            -H "Accept: application/vnd.github.diff" \
            > /tmp/pr_full.diff

          # Filter out files that don't need review
          python3 << 'PYEOF'
          import re, sys

          SKIP_PATTERNS = [
              r'package-lock\.json$',
              r'pnpm-lock\.yaml$',
              r'yarn\.lock$',
              r'\.png$', r'\.jpg$', r'\.jpeg$', r'\.gif$', r'\.svg$', r'\.ico$', r'\.webp$',
              r'\.woff2?$', r'\.ttf$', r'\.eot$',
              r'^dist/',
              r'\.env\.example$',
              r'\.gitattributes$',
              r'\.gitignore$',
          ]

          with open('/tmp/pr_full.diff', 'r', errors='replace') as f:
              full_diff = f.read()

          # Split into per-file diffs
          file_diffs = re.split(r'(?=^diff --git )', full_diff, flags=re.MULTILINE)
          filtered = []

          for chunk in file_diffs:
              if not chunk.strip():
                  continue
              # Extract file path from "diff --git a/path b/path"
              match = re.match(r'diff --git a/(.*?) b/(.*)', chunk)
              if not match:
                  filtered.append(chunk)
                  continue
              filepath = match.group(2)
              if any(re.search(p, filepath) for p in SKIP_PATTERNS):
                  continue
              filtered.append(chunk)

          result = ''.join(filtered)

          # Truncate to ~100k chars to stay within Gemini context limits
          MAX_CHARS = 100_000
          if len(result) > MAX_CHARS:
              result = result[:MAX_CHARS] + '\n\n... [diff truncated due to size] ...'

          with open('/tmp/pr_filtered.diff', 'w') as f:
              f.write(result)

          # Check if there's anything left to review
          if not result.strip():
              print('NO_DIFF=true')
              with open('/tmp/skip_review', 'w') as f:
                  f.write('true')
          else:
              with open('/tmp/skip_review', 'w') as f:
                  f.write('false')
          PYEOF

          echo "skip=$(cat /tmp/skip_review)" >> "$GITHUB_OUTPUT"

      - name: Skip if no reviewable changes
        if: steps.diff.outputs.skip == 'true'
        run: echo "No reviewable file changes found. Skipping review."

      - name: Run Enhanced Review
        if: steps.diff.outputs.skip != 'true'
        id: enhanced-review
        env:
          GEMINI_AI_KEY: ${{ secrets.GEMINI_AI_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Run the enhanced review harness
          node .github/scripts/enhanced-review-harness.js \
            --pr-number "$PR_NUMBER" \
            --pr-title "$PR_TITLE" \
            --pr-sha "$PR_SHA" \
            --diff-file /tmp/pr_filtered.diff \
            > /tmp/enhanced_review_result.json

          echo "Enhanced review completed:"
          cat /tmp/enhanced_review_result.json

      - name: Submit GitHub Review
        if: steps.diff.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          # Load review result
          REVIEW_RESULT=$(cat /tmp/enhanced_review_result.json)

          # Extract values using jq
          REVIEW_COMMENT=$(echo "$REVIEW_RESULT" | jq -r '.reviewComment')
          CRITICAL_ISSUES=$(echo "$REVIEW_RESULT" | jq '.issues[] | select(.confidence >= 80) | .confidence' | wc -l)
          TOTAL_ISSUES=$(echo "$REVIEW_RESULT" | jq '.issues | length')
          DURATION=$(echo "$REVIEW_RESULT" | jq '.performanceMetrics.duration')
          AGENTS=$(echo "$REVIEW_RESULT" | jq '.performanceMetrics.agentsSpawned')

                        # Dismiss previous reviews
              gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
                --jq '[.[] | select(.user.login == "github-actions[bot]" and .state == "CHANGES_REQUESTED") | .id]' \
                > /tmp/previous_reviews.json

              if [ -s /tmp/previous_reviews.json ]; then
                review_ids=$(jq -r '.[]' /tmp/previous_reviews.json)
                for rid in $review_ids; do
                  gh api --method PUT \
                    "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews/$rid/dismissals" \
                    -f message="Superseded by enhanced review" \
                    -f event=DISMISS
                  echo "Dismissed previous review $rid"
                done
              fi

              # Determine review event
              if [ "$CRITICAL_ISSUES" -gt 0 ]; then
                event="REQUEST_CHANGES"
                status_message="đźš¨ Found $CRITICAL_ISSUES critical issue(s)"
              else
                event="APPROVE"
                status_message="âś… Approved â€” $TOTAL_ISSUES issue(s) found"
              fi

              # Create review body
              REVIEW_BODY="$(cat <<EOF
$REVIEW_COMMENT

---

### đźš€ Enhanced Review Performance
- Review Time: ${DURATION}ms
- Agents Used: ${AGENTS}
- Total Issues Found: ${TOTAL_ISSUES}
- Critical Issues: ${CRITICAL_ISSUES}

---

*This enhanced review uses specialized AI agents for better code quality analysis.*
EOF
)"

              # Submit review
              gh api \
                "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
                --method POST \
                -f body="$REVIEW_BODY" \
                -f event="$event" \
                -f commit_id="${{ github.event.pull_request.head.sha }}"

              echo "âś… Review submitted: $event"
              echo "   $status_message"