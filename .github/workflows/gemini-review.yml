name: Gemini AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

concurrency:
  group: gemini-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    # Skip draft PRs
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
            -H "Accept: application/vnd.github.diff" \
            > /tmp/pr_full.diff

          # Filter out files that don't need review
          python3 << 'PYEOF'
          import re, sys

          SKIP_PATTERNS = [
              r'package-lock\.json$',
              r'pnpm-lock\.yaml$',
              r'yarn\.lock$',
              r'\.png$', r'\.jpg$', r'\.jpeg$', r'\.gif$', r'\.svg$', r'\.ico$', r'\.webp$',
              r'\.woff2?$', r'\.ttf$', r'\.eot$',
              r'^dist/',
              r'\.env\.example$',
              r'\.gitattributes$',
              r'\.gitignore$',
          ]

          with open('/tmp/pr_full.diff', 'r', errors='replace') as f:
              full_diff = f.read()

          # Split into per-file diffs
          file_diffs = re.split(r'(?=^diff --git )', full_diff, flags=re.MULTILINE)
          filtered = []

          for chunk in file_diffs:
              if not chunk.strip():
                  continue
              # Extract file path from "diff --git a/path b/path"
              match = re.match(r'diff --git a/(.*?) b/(.*)', chunk)
              if not match:
                  filtered.append(chunk)
                  continue
              filepath = match.group(2)
              if any(re.search(p, filepath) for p in SKIP_PATTERNS):
                  continue
              filtered.append(chunk)

          result = ''.join(filtered)

          # Truncate to ~100k chars to stay within Gemini context limits
          MAX_CHARS = 100_000
          if len(result) > MAX_CHARS:
              result = result[:MAX_CHARS] + '\n\n... [diff truncated due to size] ...'

          with open('/tmp/pr_filtered.diff', 'w') as f:
              f.write(result)

          # Check if there's anything left to review
          if not result.strip():
              print('NO_DIFF=true')
              with open('/tmp/skip_review', 'w') as f:
                  f.write('true')
          else:
              with open('/tmp/skip_review', 'w') as f:
                  f.write('false')
          PYEOF

          echo "skip=$(cat /tmp/skip_review)" >> "$GITHUB_OUTPUT"

      - name: Skip if no reviewable changes
        if: steps.diff.outputs.skip == 'true'
        run: echo "No reviewable file changes found. Skipping review."

      - name: Review with Gemini
        if: steps.diff.outputs.skip != 'true'
        id: gemini
        env:
          GEMINI_AI_KEY: ${{ secrets.GEMINI_AI_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          DIFF=$(cat /tmp/pr_filtered.diff)

          # Build the review prompt
          PROMPT=$(cat << 'PROMPT_END'
          You are a Senior Frontend Engineer performing an automated code review for the AIVORA project — an AI Marketplace built with React, TypeScript (strict mode), Vite, Tailwind v4, and Feature-Sliced Design (FSD) architecture.

          ## Project Guidelines (from GEMINI.md)

          ### Architecture (FSD)
          - Features are strictly isolated in `src/features/<name>/` with: components/, hooks/, pages/, schema.ts, services.ts, store.ts, types.ts, index.ts
          - Shared layer: `src/shared/`, App layer: `src/app/`, Lib layer: `src/lib/`

          ### TypeScript Strictness
          - MUST use `import type` for type-only imports (`verbatimModuleSyntax`)
          - MUST NOT use standard `enum` — use `const X = {...} as const` instead (`erasableSyntaxOnly`)

          ### Styling
          - Tailwind v4 with `@theme` — NO legacy `tailwind.config.js`
          - Prefer `class-variance-authority` (CVA) for component variants

          ### Data & API
          - Use Zod + react-hook-form for validation
          - API endpoints managed in `src/shared/constants/index.ts`

          ### Security
          - Never log/print/commit secrets, API keys, or `.env` files
          - Never commit AI metadata (`.gemini/`, `MEMORY.md`)

          ## Your Review Task

          Review the PR diff below. Focus ONLY on changes introduced in this PR (not pre-existing code).

          ### Review Focus Areas (ordered by priority):
          1. **Bugs**: Logic errors, null/undefined risks, race conditions, infinite loops, missing error handling
          2. **Security**: XSS vulnerabilities, credential exposure, unsafe `dangerouslySetInnerHTML`, eval usage
          3. **TypeScript compliance**: Missing `import type`, enum usage, `any` types where avoidable
          4. **FSD architecture violations**: Cross-feature imports, wrong layer dependencies
          5. **React anti-patterns**: Rules of Hooks violations, missing deps in useEffect, missing keys in lists

          ### Confidence Scoring
          For each issue found, assign a confidence score (0-100):
          - 0: False positive, doesn't hold up under scrutiny
          - 25: Might be real, could also be false positive. Stylistic issue not in GEMINI.md
          - 50: Real but minor, nitpick, or unlikely in practice
          - 75: Verified real and important, directly impacts functionality or violates GEMINI.md
          - 100: Absolutely certain, confirmed real issue, will cause problems

          ### What is NOT an issue (false positives to ignore):
          - Pre-existing issues not introduced in this PR
          - Things linters/typecheckers will catch (imports, formatting, unused vars)
          - Pedantic style nitpicks a senior engineer wouldn't flag
          - Intentional functionality changes related to the PR's purpose
          - General code quality concerns not in GEMINI.md (unless severe bugs)
          - Issues on lines the author did not modify

          ### Output Format
          Respond with ONLY valid JSON, no markdown fences, no extra text:
          {
            "summary": "Brief 1-2 sentence summary of the PR changes",
            "issues": [
              {
                "file": "path/to/file.ts",
                "line": 42,
                "description": "Brief description of the issue",
                "confidence": 85,
                "category": "bug|security|typescript|architecture|react",
                "suggestion": "How to fix it (optional, brief)"
              }
            ]
          }

          If no issues with confidence >= 50 exist, return:
          {
            "summary": "Brief summary of changes",
            "issues": []
          }

          PROMPT_END
          )

          # Build JSON payload for Gemini API
          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            --arg title "$PR_TITLE" \
            --arg body "${PR_BODY:-No description provided}" \
            --arg author "$PR_AUTHOR" \
            --arg diff "$DIFF" \
            '{
              "contents": [{
                "parts": [{
                  "text": ($prompt + "\n\n## PR Information\n- **Title**: " + $title + "\n- **Author**: " + $author + "\n- **Description**: " + $body + "\n\n## Diff\n```diff\n" + $diff + "\n```")
                }]
              }],
              "generationConfig": {
                "temperature": 0.2,
                "topP": 0.8,
                "maxOutputTokens": 8192,
                "responseMimeType": "application/json"
              }
            }')

          # Call Gemini API
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${GEMINI_AI_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Gemini API returned HTTP $HTTP_CODE"
            echo "$BODY" | head -20
            exit 1
          fi

          # Extract the text content from Gemini response
          REVIEW_JSON=$(echo "$BODY" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$REVIEW_JSON" ]; then
            echo "::error::Empty response from Gemini"
            echo "$BODY" | jq . || echo "$BODY"
            exit 1
          fi

          echo "$REVIEW_JSON" > /tmp/review_result.json

          # Validate it's proper JSON
          if ! jq empty /tmp/review_result.json 2>/dev/null; then
            echo "::warning::Gemini returned invalid JSON, attempting cleanup..."
            # Try to extract JSON from potential markdown fences
            echo "$REVIEW_JSON" | sed 's/^```json//; s/^```//; s/```$//' | jq . > /tmp/review_result.json 2>/dev/null || {
              echo "::error::Could not parse Gemini response as JSON"
              echo "$REVIEW_JSON"
              exit 1
            }
          fi

          echo "Review result:"
          jq . /tmp/review_result.json

      - name: Submit GitHub Review
        if: steps.diff.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys

          with open('/tmp/review_result.json', 'r') as f:
              review = json.load(f)

          summary = review.get('summary', 'No summary provided.')
          issues = review.get('issues', [])

          # Categorize issues by confidence tier
          high_confidence = [i for i in issues if i.get('confidence', 0) >= 80]
          medium_confidence = [i for i in issues if 50 <= i.get('confidence', 0) < 80]

          pr_number = os.environ['PR_NUMBER']
          head_sha = os.environ['HEAD_SHA']
          repo = os.environ['REPO']

          CATEGORY_ICONS = {
              'bug': '🐛',
              'security': '🔒',
              'typescript': '📘',
              'architecture': '🏗️',
              'react': '⚛️',
          }

          def format_issues(issue_list, start_idx=1):
              """Format a list of issues into markdown lines."""
              lines = []
              for idx, issue in enumerate(issue_list, start_idx):
                  icon = CATEGORY_ICONS.get(issue.get('category', ''), '⚠️')
                  conf = issue.get('confidence', 0)
                  file_path = issue.get('file', 'unknown')
                  line = issue.get('line', 0)
                  desc = issue.get('description', 'No description')
                  suggestion = issue.get('suggestion', '')
                  category = issue.get('category', 'other').upper()

                  link = f'https://github.com/{repo}/blob/{head_sha}/{file_path}'
                  if line:
                      start = max(1, line - 1)
                      end = line + 1
                      link += f'#L{start}-L{end}'

                  lines.append(f'{idx}. {icon} **[{category}]** {desc} (confidence: {conf})')
                  lines.append('')
                  lines.append(f'   📄 [{file_path}:{line}]({link})')
                  if suggestion:
                      lines.append('')
                      lines.append(f'   💡 **Suggestion:** {suggestion}')
                  lines.append('')
              return lines

          FOOTER = [
              '---',
              '<sub>🤖 Reviewed by Gemini 3.1 Flash Lite | '
              'React with 👍 if helpful, 👎 if not</sub>',
          ]

          if high_confidence:
              # REQUEST_CHANGES — critical issues found
              body_lines = [
                  '## 🤖 Gemini AI Code Review',
                  '',
                  f'> {summary}',
                  '',
                  f'### 🚨 Found **{len(high_confidence)}** critical issue(s) (confidence ≥ 80):',
                  '',
              ]
              body_lines.extend(format_issues(high_confidence))

              if medium_confidence:
                  body_lines.extend([
                      f'### 💬 Additionally, **{len(medium_confidence)}** minor note(s) (confidence 50-79):',
                      '',
                  ])
                  body_lines.extend(format_issues(medium_confidence))

              body_lines.extend(FOOTER)
              event = 'REQUEST_CHANGES'

          elif medium_confidence:
              # COMMENT — only minor issues, don't block the PR
              body_lines = [
                  '## 🤖 Gemini AI Code Review',
                  '',
                  f'> {summary}',
                  '',
                  f'### 💬 Found **{len(medium_confidence)}** minor note(s) (confidence 50-79):',
                  '',
                  '*These are observations, not blockers. Review at your discretion.*',
                  '',
              ]
              body_lines.extend(format_issues(medium_confidence))
              body_lines.extend(FOOTER)
              event = 'COMMENT'

          else:
              # APPROVE — no issues at all
              body_lines = [
                  '## 🤖 Gemini AI Code Review',
                  '',
                  f'> {summary}',
                  '',
                  '✅ No significant issues found. Code looks good!',
                  '',
                  'Checked for: bugs, security, TypeScript compliance, FSD architecture, React best practices.',
                  '',
              ]
              body_lines.extend(FOOTER)
              event = 'APPROVE'

          body = '\n'.join(body_lines)

          # Submit the review via GitHub API
          review_payload = json.dumps({
              'body': body,
              'event': event,
              'commit_id': head_sha,
          })

          result = subprocess.run(
              [
                  'gh', 'api',
                  f'repos/{repo}/pulls/{pr_number}/reviews',
                  '--method', 'POST',
                  '--input', '-',
              ],
              input=review_payload,
              capture_output=True,
              text=True,
          )

          if result.returncode != 0:
              print(f'::error::Failed to submit review: {result.stderr}')
              sys.exit(1)

          STATUS_MAP = {
              'REQUEST_CHANGES': f'🚨 Issues found: {len(high_confidence)} critical, {len(medium_confidence)} minor',
              'COMMENT': f'💬 Minor notes: {len(medium_confidence)} (no blockers)',
              'APPROVE': '✅ No issues — PR approved!',
          }
          print(f'Review submitted: {event}')
          print(f'   {STATUS_MAP[event]}')

          PYEOF
